services:
    _defaults:
        autowire: true
        autoconfigure: true
        public: false

    KonradMichalik\RoutingBenchmark\:
        resource: '../Classes/*'

    # The plain middleware is fetched from the container by the TYPO3 middleware stack at runtime.
    KonradMichalik\RoutingBenchmark\Middleware\PlainBenchmarkMiddleware:
        public: true
