## #ddev-generated
services:
    web:
        environment:
            - EXTENSION_KEY=typo3_routing
            - EXTENSION_NAME=typo3-routing
            - PACKAGE_NAME=konradmichalik/typo3-routing
            - TYPO3_VERSIONS=13 14

            # TYPO3 v13 config
            - TYPO3_DB_DRIVER=mysqli
            - TYPO3_DB_USERNAME=root
            - TYPO3_DB_PASSWORD=root
            - TYPO3_DB_HOST=db
            - TYPO3_SETUP_ADMIN_EMAIL=admin@example.com
            - TYPO3_SETUP_ADMIN_USERNAME=admin
            - TYPO3_SETUP_ADMIN_PASSWORD=Password1!
            - TYPO3_PROJECT_NAME=EXT:typo3-routing Dev Environment
            - TYPO3_SERVER_TYPE=apache

            # typo3-request-profiler — drives the `ddev benchmark` comparison.
            # FORCE keeps it recording regardless of application context; KEEP must exceed the
            # number of requests a benchmark run produces so none get auto-pruned mid-run.
            - TYPO3_REQUEST_PROFILER_FORCE=1
            - TYPO3_REQUEST_PROFILER_MIN_MS=0
            - TYPO3_REQUEST_PROFILER_KEEP=5000
